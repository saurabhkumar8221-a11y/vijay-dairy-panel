<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airtek Digital Onboarding</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 p-5 text-gray-100">
    <div class="max-w-xl mx-auto bg-gray-800 p-8 rounded-3xl shadow-2xl border-b-4 border-red-600">
        <h2 class="text-3xl font-black text-center mb-6 text-red-500">AIRTEK DIGITAL</h2>
        
        <form id="agentForm" class="space-y-4">
            <input type="number" id="lapu" placeholder="LAPU Number" class="w-full p-3 rounded bg-gray-700 outline-none focus:ring-2 focus:ring-red-500" required>
            <input type="text" id="shopName" placeholder="Shop Name" class="w-full p-3 rounded bg-gray-700 outline-none" required>
            
            <div class="p-4 bg-gray-700 rounded-xl text-center">
                <p id="gpsText" class="text-xs mb-2">📍 Location not verified</p>
                <button type="button" onclick="getLocation()" class="bg-blue-600 px-4 py-2 rounded-full text-sm font-bold">Verify Location</button>
            </div>

            <input type="hidden" id="lat"> <input type="hidden" id="lng">
            <input type="hidden" id="address"> <input type="hidden" id="area">

            <button type="submit" id="subBtn" class="w-full bg-red-600 p-4 rounded-xl font-bold text-xl hover:bg-red-700 transition">SAVE TO SHEET</button>
        </form>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxho6A5HBshQCO_qkeAH6Cy4_Kcn0cxSaqgeflsryPAIzSW3snOZ1RAd9obHzGVy05gJw/exec"; // ⚠️ Paste your URL here

        async function getLocation() {
            document.getElementById('gpsText').innerText = "🛰️ Fetching GPS...";
            navigator.geolocation.getCurrentPosition(async (p) => {
                document.getElementById('lat').value = p.coords.latitude;
                document.getElementById('lng').value = p.coords.longitude;
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${p.coords.latitude}&lon=${p.coords.longitude}`);
                    const d = await res.json();
                    document.getElementById('address').value = d.display_name;
                    document.getElementById('area').value = d.address.suburb || d.address.village || "Local";
                    document.getElementById('gpsText').innerText = "✅ Location Verified!";
                } catch(e) { document.getElementById('gpsText').innerText = "✅ GPS OK"; }
            });
        }

        document.getElementById('agentForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('subBtn');
            btn.innerText = "Processing..."; btn.disabled = true;

            const payload = {
                lapu: document.getElementById('lapu').value,
                shopName: document.getElementById('shopName').value,
                lat: document.getElementById('lat').value,
                lng: document.getElementById('lng').value,
                address: document.getElementById('address').value,
                area: document.getElementById('area').value,
                userType: "Retailer" // Default
            };

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors', // ⚠️ Ye important hai CORS ke liye
                    cache: 'no-cache',
                    body: JSON.stringify(payload)
                });
                alert("Data Sent! Check Sheet after 2 seconds.");
                document.getElementById('agentForm').reset();
            } catch (err) {
                alert("Error: " + err);
            } finally {
                btn.innerText = "SAVE TO SHEET"; btn.disabled = false;
            }
        };
    </script>
</body>
</html>
