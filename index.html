<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxho6A5HBshQCO_qkeAH6Cy4_Kcn0cxSaqgeflsryPAIzSW3snOZ1RAd9obHzGVy05gJw/exec";

  document.getElementById('airtekForm').onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    
    // Yahan payload hai
    const payload = {
      owner: document.getElementById('owner').value,
      lapu: document.getElementById('lapu').value,
      contact: document.getElementById('contact').value,
      shopName: document.getElementById('shopName').value,
      userType: document.getElementById('userType').value,
      zone: document.getElementById('zone').value,
      lat: document.getElementById('lat').value,
      lng: document.getElementById('lng').value,
      address: document.getElementById('addr').value,
      area: document.getElementById('area').value
    };

    btn.innerText = "SAVING..."; btn.disabled = true;

    try {
      // POST Request with mode: 'no-cors' for Google Script
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors', 
        body: JSON.stringify(payload)
      });

      const localId = "E" + payload.lapu.slice(-4) + Math.floor(Math.random()*10);
      alert("✅ Data Sent Successfully!\nYour Agent ID: " + localId);
      location.reload();

    } catch (err) {
      alert("Error: " + err);
      btn.disabled = false;
    }
  };
</script>
