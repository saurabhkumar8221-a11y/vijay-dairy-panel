<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxho6A5HBshQCO_qkeAH6Cy4_Kcn0cxSaqgeflsryPAIzSW3snOZ1RAd9obHzGVy05gJw/exec"; // ⚠️ Paste URL here

  document.getElementById('airtekForm').onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    
    // Check GPS
    if(!document.getElementById('lat').value) {
      alert("Bhai pehle GPS fetch karo!");
      return;
    }

    btn.innerText = "SAVING...";
    btn.disabled = true;

    const payload = {
      owner: document.getElementById('owner').value,
      lapu: document.getElementById('lapu').value,
      contact: document.getElementById('contact').value,
      shopName: document.getElementById('shopName').value,
      userType: document.getElementById('userType').value,
      zone: document.getElementById('zone').value,
      lat: document.getElementById('lat').value,
      lng: document.getElementById('lng').value,
      address: document.getElementById('addr').value,
      area: document.getElementById('area').value
    };

    try {
      // Sending data
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify(payload)
      });

      // Show Success Message
      const id = "E" + payload.lapu.slice(-4) + Math.floor(Math.random()*10);
      alert("✅ Data Sent!\nAgent ID: " + id);
      location.reload();

    } catch (err) {
      alert("Error: " + err);
      btn.innerText = "SAVE TO SHEET";
      btn.disabled = false;
    }
  };
</script>
