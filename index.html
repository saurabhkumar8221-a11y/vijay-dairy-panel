<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airtek Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-white p-5">

    <div class="max-w-2xl mx-auto bg-[#1e293b] p-8 rounded-3xl shadow-2xl border-t-4 border-red-600">
        <h2 class="text-3xl font-black text-center text-red-500 mb-8 uppercase tracking-widest">Airtek Digital</h2>
        
        <form id="airtekForm" class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <input type="text" id="owner" placeholder="Owner Name" class="bg-[#334155] p-3 rounded-xl outline-none focus:ring-2 focus:ring-red-500" required>
            <input type="number" id="lapu" placeholder="LAPU Number" class="bg-[#334155] p-3 rounded-xl outline-none focus:ring-2 focus:ring-red-500" required>
            <input type="number" id="contact" placeholder="Contact Number" class="bg-[#334155] p-3 rounded-xl outline-none focus:ring-2 focus:ring-red-500" required>
            <input type="text" id="shopName" placeholder="Shop Name" class="bg-[#334155] p-3 rounded-xl outline-none focus:ring-2 focus:ring-red-500" required>
            
            <select id="userType" class="bg-[#334155] p-3 rounded-xl outline-none">
                <option value="Retailer">Retailer</option>
                <option value="Agent">Agent</option>
            </select>

            <select id="zone" class="bg-[#334155] p-3 rounded-xl outline-none">
                <option value="Sariranjan">Sariranjan</option>
                <option value="Patory">Patory</option>
            </select>

            <div class="md:col-span-2 bg-slate-800 p-4 rounded-2xl text-center border border-slate-700">
                <p id="gpsLabel" class="text-xs text-blue-400 mb-2 font-mono italic">📍 Verify Visit Location</p>
                <button type="button" onclick="getGPS()" class="bg-blue-600 px-6 py-2 rounded-full text-xs font-bold hover:bg-blue-700">GET LIVE GPS</button>
                
                <div class="grid grid-cols-2 gap-2 mt-3">
                    <input type="text" id="lat" placeholder="Lat" class="bg-transparent border border-slate-600 p-1 rounded text-[10px]" readonly>
                    <input type="text" id="lng" placeholder="Lng" class="bg-transparent border border-slate-600 p-1 rounded text-[10px]" readonly>
                </div>
                <input type="text" id="area" placeholder="Area" class="w-full bg-transparent border border-slate-600 p-1 mt-2 rounded text-[10px]" readonly>
                <input type="hidden" id="addr">
            </div>

            <button type="submit" id="submitBtn" class="md:col-span-2 bg-red-600 p-4 rounded-2xl font-black text-xl hover:bg-red-700 transition active:scale-95 shadow-lg shadow-red-900/50">SAVE TO SHEET</button>
        </form>
    </div>

    <script>
        // ⚠️ APNA NAYA EXEC URL YAHAN PASTE KARO
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxho6A5HBshQCO_qkeAH6Cy4_Kcn0cxSaqgeflsryPAIzSW3snOZ1RAd9obHzGVy05gJw/exec";

        async function getGPS() {
            document.getElementById('gpsLabel').innerText = "🛰️ Connecting...";
            navigator.geolocation.getCurrentPosition(async (p) => {
                const lat = p.coords.latitude; 
                const lng = p.coords.longitude;
                document.getElementById('lat').value = lat; 
                document.getElementById('lng').value = lng;
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                    const d = await res.json();
                    document.getElementById('addr').value = d.display_name;
                    document.getElementById('area').value = d.address.suburb || d.address.village || "Captured";
                    document.getElementById('gpsLabel').innerText = "✅ Location Verified!";
                } catch(e) { document.getElementById('gpsLabel').innerText = "✅ GPS Fixed"; }
            }, (err) => {
                alert("GPS Permission ON karo!");
                document.getElementById('gpsLabel').innerText = "❌ GPS Error";
            });
        }

        document.getElementById('airtekForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            if(!document.getElementById('lat').value) {
                alert("Pehle GPS verify kar lo!");
                return;
            }
            
            btn.innerText = "SAVING..."; 
            btn.disabled = true;

            const payload = {
                owner: document.getElementById('owner').value,
                lapu: document.getElementById('lapu').value,
                contact: document.getElementById('contact').value,
                shopName: document.getElementById('shopName').value,
                userType: document.getElementById('userType').value,
                zone: document.getElementById('zone').value,
                lat: document.getElementById('lat').value,
                lng: document.getElementById('lng').value,
                address: document.getElementById('addr').value,
                area: document.getElementById('area').value
            };
