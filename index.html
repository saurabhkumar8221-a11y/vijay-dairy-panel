<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent Registration</title>
<style>
body{font-family:Arial;padding:20px}
input,select,button{width:100%;padding:8px;margin:5px 0}
button{background:green;color:white;border:none}
</style>
</head>
<body>

<h2>Agent Registration</h2>

<select id="userType">
<option>Retailer</option>
<option>Agent</option>
</select>

<input id="lapu" placeholder="LAPU 10 Digit">
<input id="contact" placeholder="Contact 10 Digit">
<input id="shopName" placeholder="Shop Name">
<input id="owner" placeholder="Owner Name">

<select id="zone">
<option>Sarairanjan</option>
<option>Patory</option>
</select>

<select id="remarks">
<option>High Volume</option>
<option>Medium</option>
<option>Low</option>
</select>

<button onclick="submitForm()">Submit</button>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbwBLEQkleE8CUjnIg3VA7JRiScMuLFLTWkBnSAFeW37O2j4pGXmCDsSFpeLFVxuhYttXA/exec";

let lat="", lon="", address="", area="";

navigator.geolocation.getCurrentPosition(async function(pos){
lat = pos.coords.latitude;
lon = pos.coords.longitude;

const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
const data = await res.json();

address = data.display_name;
area = data.address.suburb || data.address.village || "";
});

async function submitForm(){

let response = await fetch(scriptURL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
userType:document.getElementById("userType").value,
lapu:document.getElementById("lapu").value,
contact:document.getElementById("contact").value,
shopName:document.getElementById("shopName").value,
owner:document.getElementById("owner").value,
latitude:lat,
longitude:lon,
address:address,
area:area,
zone:document.getElementById("zone").value,
remarks:document.getElementById("remarks").value
})
});

let result = await response.text();

if(result.startsWith("Success")){
let code = result.split("|")[1];
alert("Agent Created\nAgent Code: "+code);
}else{
alert(result);
}
}
</script>
</body>
</html>
